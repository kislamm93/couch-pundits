name: Deploy UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'wc2026-ui/**'
      - '.github/workflows/deploy-ui.yml'
  workflow_dispatch:

# Permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wc2026-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wc2026-ui/package-lock.json

      - run: npm ci

      - name: Build
        env:
          # Render API URL — set as a repo variable: Settings → Secrets and
          # variables → Actions → Variables → VITE_API_BASE (no trailing slash).
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          # Project-page base path, e.g. /wc2026-project/
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: wc2026-ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
