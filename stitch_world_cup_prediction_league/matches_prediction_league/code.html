<script>
        // Simple Micro-interactions for score steppers
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const icon = this.querySelector('.material-symbols-outlined');
                if (icon && (icon.textContent === 'add' || icon.textContent === 'remove')) {
                    const scoreSpan = this.parentElement.querySelector('.font-display-score');
                    let currentScore = parseInt(scoreSpan.textContent);
                    if (icon.textContent === 'add') {
                        scoreSpan.textContent = currentScore + 1;
                    } else if (icon.textContent === 'remove' && currentScore > 0) {
                        scoreSpan.textContent = currentScore - 1;
                    }
                    
                    // Simple pop animation
                    scoreSpan.style.transform = 'scale(1.2)';
                    setTimeout(() => {
                        scoreSpan.style.transform = 'scale(1)';
                    }, 100);
                }
            });
        });
    </script>
