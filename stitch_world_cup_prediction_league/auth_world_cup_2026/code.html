<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>World Cup 2026 Prediction League - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@700;800&amp;family=Archivo+Narrow:wght@600;700&amp;family=Hanken+Grotesk:wght@400;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@100..900&amp;family=Archivo+Narrow:wght@100..900&amp;family=Hanken+Grotesk:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#171c25",
                        "tertiary-fixed-dim": "#c0c6d8",
                        "primary-fixed-dim": "#11e37d",
                        "background": "#10131a",
                        "on-tertiary-fixed-variant": "#404755",
                        "primary-container": "#00e07a",
                        "secondary-container": "#444953",
                        "on-primary-container": "#005d2f",
                        "outline": "#859586",
                        "surface-container-high": "#272a31",
                        "tertiary-container": "#bcc3d4",
                        "surface-variant": "#32353c",
                        "inverse-on-surface": "#2e3037",
                        "surface-container-highest": "#32353c",
                        "error": "#ffb4ab",
                        "surface-container-low": "#191c22",
                        "primary-fixed": "#5eff9b",
                        "on-secondary-fixed-variant": "#424751",
                        "on-tertiary-fixed": "#151c28",
                        "on-tertiary-container": "#49505f",
                        "error-container": "#93000a",
                        "primary": "#45fd93",
                        "on-primary": "#00391a",
                        "secondary": "#c2c6d3",
                        "on-secondary": "#2c313a",
                        "secondary-fixed-dim": "#c2c6d3",
                        "surface-tint": "#11e37d",
                        "on-tertiary": "#2a313e",
                        "on-surface": "#e1e2eb",
                        "surface-dim": "#10131a",
                        "on-primary-fixed-variant": "#005229",
                        "on-secondary-container": "#b4b8c5",
                        "surface-bright": "#363940",
                        "on-surface-variant": "#bacbba",
                        "tertiary-fixed": "#dce2f4",
                        "surface": "#10131a",
                        "on-error": "#690005",
                        "on-background": "#e1e2eb",
                        "surface-container": "#1d2026",
                        "tertiary": "#d8dff1",
                        "on-primary-fixed": "#00210d",
                        "inverse-primary": "#006d38",
                        "outline-variant": "#3c4a3e",
                        "on-error-container": "#ffdad6",
                        "inverse-surface": "#e1e2eb",
                        "surface-container-lowest": "#0b0e14",
                        "secondary-fixed": "#dee2ef"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "4px",
                        "gutter": "16px",
                        "sm": "8px",
                        "margin-mobile": "16px",
                        "xs": "4px",
                        "margin-desktop": "32px",
                        "md": "16px",
                        "lg": "24px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "display-score": ["Archivo Narrow"],
                        "label-caps": ["Archivo Narrow"],
                        "body-md": ["Hanken Grotesk"],
                        "headline-md": ["Anybody"],
                        "headline-lg-mobile": ["Anybody"],
                        "stats-numeral": ["Archivo Narrow"],
                        "headline-lg": ["Anybody"],
                        "body-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "display-score": ["48px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.08em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "28px", "fontWeight": "700"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "32px", "fontWeight": "800"}],
                        "stats-numeral": ["20px", {"lineHeight": "20px", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "800"}],
                        "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0b0e14;
            color: #e1e2eb;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .vignette {
            background: radial-gradient(circle, transparent 20%, rgba(11, 14, 20, 0.9) 100%);
        }
        .field-focus:focus-within {
            border-color: #00e07a;
            box-shadow: 0 0 0 1px #00e07a;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Hero Background Motif -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-[#0B0E14]"></div>
<div class="absolute inset-0 opacity-20 vignette"></div>
<!-- Football Motif Layer -->
<div class="absolute top-[-10%] right-[-10%] w-[300px] h-[300px] blur-[80px] bg-primary/20 rounded-full"></div>
<div class="absolute bottom-[-5%] left-[-15%] w-[250px] h-[250px] blur-[100px] bg-secondary-container/30 rounded-full"></div>
<div class="absolute inset-0 flex items-center justify-center overflow-hidden opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-[400px] rotate-12" style="font-variation-settings: 'wght' 100;">sports_soccer</span>
</div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-grow flex flex-col items-center justify-center px-margin-mobile pt-safe pb-safe">
<!-- Header Branding Section -->
<header class="w-full text-center mb-xl">
<div class="inline-flex items-center justify-center p-md rounded-full bg-surface-container mb-md border border-outline-variant/30">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tighter uppercase mb-xs">
                World Cup 2026
            </h1>
<p class="font-label-caps text-label-caps text-primary tracking-[0.2em] uppercase">
                Prediction League
            </p>
</header>
<!-- Auth Form Container -->
<div class="w-full max-w-[358px] flex flex-col gap-lg">
<!-- Login Form -->
<form class="flex flex-col gap-md" id="loginForm" onsubmit="return false;">
<!-- Username Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-xs" for="username">Username</label>
<div class="relative group field-focus border border-outline-variant bg-surface-container-lowest rounded-lg transition-all duration-200">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors">person</span>
<input class="w-full bg-transparent border-none py-lg pl-[48px] pr-md text-on-surface font-body-md placeholder:text-secondary/30 focus:ring-0" id="username" placeholder="Enter your username" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-xs" for="password">Password</label>
<div class="relative group field-focus border border-outline-variant bg-surface-container-lowest rounded-lg transition-all duration-200">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-transparent border-none py-lg pl-[48px] pr-md text-on-surface font-body-md placeholder:text-secondary/30 focus:ring-0" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Error Placeholder -->
<div class="hidden h-5" id="error-message">
<p class="text-error font-body-md text-[14px] flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">error</span>
<span>Invalid username or password. Please try again.</span>
</p>
</div>
<!-- Action Button -->
<button class="w-full bg-primary-container hover:bg-primary py-lg rounded-lg transition-all duration-200 active:scale-[0.98] mt-sm shadow-lg shadow-primary-container/20" type="submit">
<span class="font-label-caps text-label-caps text-on-primary-container text-[14px]">Log in</span>
</button>
</form>
<!-- Toggle Links -->
<div class="flex flex-col items-center gap-md">
<a class="font-body-md text-on-surface-variant hover:text-primary transition-colors" href="#">
                    Forgot password?
                </a>
<div class="w-full h-[1px] bg-outline-variant/20 relative my-sm">
<span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-background px-md font-label-caps text-label-caps text-on-surface-variant">OR</span>
</div>
<p class="font-body-md text-on-surface-variant">
                    New here? 
                    <a class="text-primary font-semibold hover:underline underline-offset-4 decoration-2" href="#">Create an account</a>
</p>
</div>
</div>
</main>
<!-- Footer Decorative / Safe Area -->
<footer class="relative z-10 p-gutter pb-safe text-center">
<p class="font-label-caps text-[10px] text-on-surface-variant opacity-40 uppercase tracking-widest">
            Official FIFA 2026 Engagement Partner
        </p>
</footer>
<script>
        // Simple micro-interaction for the error placeholder and login button
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('error-message');
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            // Simulate error state for visual check
            errorMsg.classList.remove('hidden');
            errorMsg.classList.add('flex', 'animate-pulse');
            
            setTimeout(() => {
                errorMsg.classList.remove('animate-pulse');
            }, 1000);
        });

        // Toggle visibility micro-interaction
        const passToggle = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        let visible = false;
        
        passToggle.addEventListener('click', () => {
            visible = !visible;
            passInput.type = visible ? 'text' : 'password';
            passToggle.querySelector('span').textContent = visible ? 'visibility_off' : 'visibility';
        });
    </script>
</body></html>
